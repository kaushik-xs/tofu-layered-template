---
# Vars:
#   zerotier_network_id — 16-hex ZeroTier network ID to join (required)
# ZeroTier generates its own node identity on first start.
# Authorize the device in ZeroTier Central after this role runs.

- name: Check if ZeroTier is already installed
  ansible.builtin.command: which zerotier-cli
  register: zerotier_check
  changed_when: false
  failed_when: false

- name: Install ZeroTier via official script
  ansible.builtin.shell: |
    curl -s https://install.zerotier.com | bash
  when: zerotier_check.rc != 0

- name: Ensure ZeroTier service is enabled and started
  ansible.builtin.service:
    name: zerotier-one
    state: started
    enabled: yes

- name: Wait for ZeroTier daemon to be ready
  ansible.builtin.command: zerotier-cli status
  register: zt_status
  retries: 10
  delay: 3
  until: zt_status.rc == 0
  changed_when: false

- name: Join ZeroTier network
  ansible.builtin.command: zerotier-cli join {{ zerotier_network_id }}
  register: zt_join
  changed_when: "'200 join OK' in zt_join.stdout"

- name: Display ZeroTier status
  ansible.builtin.debug:
    msg:
      - "ZeroTier status: {{ zt_status.stdout }}"
      - "Joined network: {{ zerotier_network_id }}"
      - "Authorize this device in ZeroTier Central."
