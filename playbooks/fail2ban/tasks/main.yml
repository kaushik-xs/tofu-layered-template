- name: Install fail2ban package
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true

# jail.local
- name: Deploy fail2ban jail.local configuration
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
    content: |
      [DEFAULT]
      bantime  = 1h
      findtime = 10m
      maxretry = 5
      banaction = iptables-multiport
      backend = polling
      ignoreip = 127.0.0.1/8 ::1 172.17.0.0/16

      # ----------------------------
      # Recidive
      # ----------------------------
      [recidive]
      enabled   = true
      logpath   = /var/log/fail2ban.log
      bantime   = 1w
      findtime  = 1d
      maxretry  = 5

      # ----------------------------
      # SSH
      # ----------------------------
      [sshd]
      enabled  = true
      port     = 22
      backend  = systemd
      maxretry = 5
      bantime  = 24h

      # ----------------------------
      # CADDY JAILS
      # ----------------------------

      # DOS / burst traffic
      [caddy-dos]
      enabled  = true
      port     = http,https
      filter   = caddy-dos
      logpath  = /var/log/caddy/*.access.log
      findtime = 10s
      maxretry = 50
      bantime  = 10m

      # 404 scanners
      [caddy-404]
      enabled  = true
      port     = http,https
      filter   = caddy-404
      logpath  = /var/log/caddy/*.access.log
      findtime = 5m
      maxretry = 15
      bantime  = 1h

      # abuse / auth / rate-limit
      [caddy-abuse]
      enabled  = true
      port     = http,https
      filter   = caddy-abuse
      logpath  = /var/log/caddy/*.log
      findtime = 10m
      maxretry = 10
      bantime  = 2h
  register: fail2ban_jail_local


# FILTERS (CADDY JSON)
- name: Deploy fail2ban filters for caddy
  ansible.builtin.copy:
    dest: "/etc/fail2ban/filter.d/{{ item.name }}.conf"
    owner: root
    group: root
    mode: "0644"
    content: "{{ item.content }}"
  loop:
    # DOS (counts all requests)
    - name: caddy-dos
      content: |
        [Definition]
        failregex = ^.*"remote_ip":"<HOST>"
        ignoreregex = "status":(200|301|302)

    # 404 scanners
    - name: caddy-404
      content: |
        [Definition]
        failregex = ^.*"status":404.*"remote_ip":"<HOST>"
                    ^.*"remote_ip":"<HOST>".*"status":404
        ignoreregex =

    # abuse (auth + rate limit)
    - name: caddy-abuse
      content: |
        [Definition]
        failregex = ^.*"status":(401|403|429).*"remote_ip":"<HOST>"
                    ^.*"remote_ip":"<HOST>".*"status":(401|403|429)
        ignoreregex =
  register: fail2ban_caddy_filters

# SERVICE
- name: Ensure fail2ban is enabled and running
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started

- name: Restart fail2ban if config changed
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  when: fail2ban_jail_local.changed or fail2ban_caddy_filters.changed