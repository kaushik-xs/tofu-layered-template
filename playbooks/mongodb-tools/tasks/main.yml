---
- name: Add MongoDB 7.0 GPG key
  ansible.builtin.shell: |
    curl -fsSL https://pgp.mongodb.com/server-7.0.asc \
      | gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor
  args:
    creates: /usr/share/keyrings/mongodb-server-7.0.gpg

- name: Add MongoDB 7.0 APT repository for Ubuntu Jammy
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/mongodb-org-7.0.list
    content: |
      deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse
    mode: '0644'

- name: Update apt cache after adding MongoDB repository
  ansible.builtin.apt:
    update_cache: yes

- name: Install MongoDB Database Tools
  ansible.builtin.apt:
    name: mongodb-database-tools
    state: present

- name: Display MongoDB Database Tools installation message
  ansible.builtin.debug:
    msg:
      - "MongoDB Database Tools have been successfully installed!"
      - "You can now use tools like mongodump, mongorestore, mongoexport, and mongoimport."

