name: platform_layer

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: "OpenTofu workspace (for example: dev, stage, prod)"
        required: true
        type: string
      action:
        description: "Run plan or apply"
        required: true
        type: choice
        options:
          - plan
          - apply

jobs:
  rollout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_PROFILE: ci
      TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: Enforce OpenTofu 1.11.6
        run: |
          VERSION="$(tofu version -json | jq -r '.terraform_version')"
          test "${VERSION}" = "1.11.6"

      - name: Write backend tfvars (matches scripts/tofu-init-from-tfvars.sh)
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
        run: |
          LAYER_NAME=platform_layer
          LAYER_DIR=layers/platform_layer
          WS="${{ inputs.workspace }}"
          OUT="${LAYER_DIR}/terraform.${AWS_PROFILE}.tfvars"
          {
            echo "tf_state_bucket = \"${TF_STATE_BUCKET}\""
            echo "tf_state_key = \"opentofu/${LAYER_NAME}/${WS}/terraform.tfstate\""
            echo "tf_state_region = \"${TF_STATE_REGION}\""
            echo "tf_state_encrypt = true"
          } > "${OUT}"

      - name: Roll out layer
        run: |
          ./scripts/tofu-layer-run.sh \
            platform_layer \
            layers/platform_layer \
            "${{ inputs.workspace }}" \
            "${{ inputs.action }}"
